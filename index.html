<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX V2 — Pro Dynamic Post Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
/* ════════════════════════════════════════════
   DESIGN TOKENS & THEMING
════════════════════════════════════════════ */
:root {
  --gold: #c9a84c; /* Default, overridden by JS color picker */
  --gold-l: color-mix(in srgb, var(--gold) 80%, white);
  --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

[data-theme="dark"] {
  --bg: #0a0a0a; --surface: #141414; --surface2: #1c1c1c;
  --border: color-mix(in srgb, var(--gold) 20%, transparent);
  --border2: rgba(255,255,255,0.08);
  --text: #f0ebe0; --text2: #9a9080;
  --shadow: 0 24px 60px rgba(0,0,0,0.6);
}

[data-theme="light"] {
  --bg: #f2ede3; --surface: #faf7f0; --surface2: #ede8dc;
  --border: color-mix(in srgb, var(--gold) 30%, transparent);
  --border2: rgba(0,0,0,0.08);
  --text: #1a1510; --text2: #7a6e5e;
  --shadow: 0 24px 60px rgba(100,80,40,0.18);
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Mono', monospace; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; margin: 0; transition: background var(--transition), color var(--transition); }

/* ════════════════════════════════════════════
   HEADER
════════════════════════════════════════════ */
.app-header { position: sticky; top: 0; z-index: 200; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 0.3em; color: var(--gold); line-height: 1; transition: color var(--transition);}
.logo-sub { font-size: 0.52rem; letter-spacing: 0.2em; color: var(--text2); display: block; margin-top: -2px; }
.header-actions { display: flex; gap: 0.75rem; }

button { font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.15em; cursor: pointer; text-transform: uppercase; transition: all var(--transition); display: flex; align-items: center; gap: 6px; }
.theme-toggle { background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); font-size: 0.58rem; padding: 6px 14px; }
.theme-toggle:hover { border-color: var(--gold); color: var(--gold); }
.btn-primary { background: var(--gold); border: none; color: #0a0a0a; font-size: 0.6rem; padding: 8px 18px; font-weight: 500; }
.btn-primary:hover { filter: brightness(1.2); transform: translateY(-1px); }
.btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text2); font-size: 0.58rem; padding: 7px 16px; }
.btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

/* ════════════════════════════════════════════
   LAYOUT & SIDEBAR
════════════════════════════════════════════ */
.app-body { display: grid; grid-template-columns: 340px 1fr; height: calc(100vh - 60px); overflow: hidden; }
@media (max-width: 900px) { .app-body { grid-template-columns: 1fr; grid-template-rows: 50vh 50vh; } .sidebar { border-right: none; border-bottom: 1px solid var(--border); } }

.sidebar { border-right: 1px solid var(--border); overflow-y: auto; background: var(--surface); }
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-section { border-bottom: 1px solid var(--border2); padding: 1.25rem 1.5rem; }
.sidebar-title { font-size: 0.55rem; letter-spacing: 0.28em; color: var(--gold); text-transform: uppercase; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px; }
.sidebar-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.tpl-btn { background: var(--surface2); border: 1px solid var(--border2); padding: 10px 8px; color: var(--text2); font-size: 0.55rem; text-align: center; }
.tpl-btn:hover, .tpl-btn.active { border-color: var(--gold); color: var(--gold); background: color-mix(in srgb, var(--gold) 10%, transparent); }

/* FORM FIELDS */
.field-group { margin-bottom: 1rem; }
label { display: block; font-size: 0.52rem; letter-spacing: 0.2em; color: var(--text2); text-transform: uppercase; margin-bottom: 5px; }
input[type="text"], textarea, input[type="file"], input[type="color"] { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: inherit; font-size: 0.65rem; padding: 9px 12px; outline: none; transition: border-color var(--transition); resize: vertical; }
input[type="text"]:focus, textarea:focus { border-color: var(--gold); }
input[type="color"] { padding: 2px; height: 36px; cursor: pointer; }
input[type="file"]::-webkit-file-upload-button { background: var(--gold); border: none; color: #0a0a0a; padding: 6px 12px; font-family: inherit; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; margin-right: 10px; }
input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: var(--border2); outline: none; cursor: pointer; margin-top: 8px; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; }

/* ════════════════════════════════════════════
   MAIN PREVIEW AREA
════════════════════════════════════════════ */
.preview-area { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
.preview-toolbar { height: 48px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 1.5rem; justify-content: space-between; }
.preview-label { font-size: 0.55rem; letter-spacing: 0.2em; color: var(--text2); text-transform: uppercase; }

.preview-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow: auto; }
.ig-post-wrapper { width: 100%; max-width: 500px; aspect-ratio: 1/1; position: relative; box-shadow: var(--shadow); transition: transform 0.3s; }
.ig-post-wrapper.animating { animation: fadeSlideIn 0.4s ease forwards; }

@keyframes fadeSlideIn {
  0% { opacity: 0; transform: translateY(10px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

.ig-post { width: 100%; height: 100%; position: absolute; inset: 0; overflow: hidden; display: flex; flex-direction: column; background-size: cover; background-position: center; }
.ig-post::before { content: ''; position: absolute; inset: 0; z-index: 1; pointer-events: none; background: rgba(0, 0, 0, var(--bg-overlay, 0)); }
.ig-post > * { position: relative; z-index: 2; }
.ig-post[data-theme-post="dark"] { background-color: #0a0a0a; color: #f0ebe0; }
.ig-post[data-theme-post="light"] { background-color: #faf5ec; color: #1a1510; }

/* ════════════════════════════════════════════
   SLIDE LAYOUTS 
════════════════════════════════════════════ */
.category-badge { border-color: currentColor; }
.rule { background: var(--gold); transition: background var(--transition);}
.brand-display { display: flex; align-items: center; justify-content: flex-end; height: 24px; }
.brand-display img { max-height: 100%; max-width: 100px; object-fit: contain; }
.brand-display span { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 0.35em; opacity: 0.6; }

/* Dynamic Typography scaling */
.slide-hook { padding: 8%; display: flex; flex-direction: column; justify-content: space-between; height: 100%; }
.slide-hook .top-bar { display: flex; justify-content: space-between; align-items: center; }
.slide-hook .category-badge { font-size: clamp(8px, 2vw, 11px); letter-spacing: 0.22em; text-transform: uppercase; border: 1px solid currentColor; padding: 4px 10px; opacity: 0.6; }
.slide-hook .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.slide-hook .hook-line { font-family: 'DM Serif Display', serif; font-size: clamp(24px, 7vw, 38px); line-height: 1.2; margin-bottom: 5%; }
.slide-hook .rule { width: 10%; height: 2px; margin-bottom: 5%; }
.slide-hook .sub-text { font-size: clamp(10px, 2.5vw, 14px); line-height: 1.8; opacity: 0.7; max-width: 90%; }
.slide-hook .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; }
.slide-hook .slide-indicator { font-size: clamp(8px, 2vw, 11px); letter-spacing: 0.15em; opacity: 0.4; }

.slide-list { padding: 8%; display: flex; flex-direction: column; height: 100%; }
.slide-list .list-eyebrow { font-size: clamp(8px, 2vw, 11px); letter-spacing: 0.28em; color: var(--gold); margin-bottom: 3%; transition: color var(--transition);}
.slide-list .list-header { font-family: 'DM Serif Display', serif; font-size: clamp(20px, 5.5vw, 28px); margin-bottom: 6%; line-height: 1.2;}
.slide-list .list-items { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4%; }
.slide-list .list-item { display: flex; gap: 4%; align-items: center; border-bottom: 1px dashed rgba(150,150,150,0.3); padding-bottom: 4%; }
.slide-list .list-item:last-child { border-bottom: none; }
.slide-list .list-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(18px, 5vw, 26px); color: var(--gold); transition: color var(--transition); min-width: 8%;}
.slide-list .list-text { font-size: clamp(10px, 2.5vw, 14px); line-height: 1.5; opacity: 0.85; }

.slide-framework { padding: 8%; display: flex; flex-direction: column; height: 100%; }
.slide-framework .fw-title { font-size: clamp(8px, 2vw, 11px); letter-spacing: 0.28em; color: var(--gold); transition: color var(--transition); margin-bottom: 3%; }
.slide-framework .fw-heading { font-family: 'DM Serif Display', serif; font-size: clamp(20px, 5vw, 26px); line-height: 1.3; margin-bottom: 6%; }
.slide-framework .fw-steps { flex: 1; display: flex; flex-direction: column; gap: 4%; }
.slide-framework .fw-step { display: flex; gap: 4%; align-items: flex-start; }
.slide-framework .step-num { font-family: 'Bebas Neue', sans-serif; font-size: clamp(20px, 6vw, 30px); color: var(--gold); transition: color var(--transition); line-height: 1; min-width: 8%; }
.slide-framework .step-text { font-size: clamp(10px, 2.5vw, 13px); line-height: 1.7; opacity: 0.8; padding-top: 1%; }

.slide-compare { padding: 8%; display: flex; flex-direction: column; height: 100%; }
.slide-compare .compare-title { font-family: 'DM Serif Display', serif; font-size: clamp(18px, 4.5vw, 24px); line-height: 1.3; margin-bottom: 1%; }
.slide-compare .compare-label { font-size: clamp(8px, 1.8vw, 10px); letter-spacing: 0.22em; color: var(--gold); transition: color var(--transition); margin-bottom: 6%; }
.slide-compare .compare-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 2%; flex: 1; }
.slide-compare .col { padding: 5%; display: flex; flex-direction: column; gap: 4%; background: rgba(120, 120, 120, 0.05); }
.slide-compare .col-elite { border-top: 2px solid var(--gold); background: color-mix(in srgb, var(--gold) 8%, transparent); transition: border-color var(--transition), background var(--transition); }
.slide-compare .col-label { font-size: clamp(8px, 1.8vw, 10px); letter-spacing: 0.25em; opacity: 0.6; }
.slide-compare .col-text { font-size: clamp(9px, 2.2vw, 12px); line-height: 1.75; opacity: 0.85; }

.slide-quote { padding: 10%; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100%; text-align: center; }
.slide-quote .quote-mark { font-family: 'DM Serif Display', serif; font-size: clamp(40px, 12vw, 70px); color: var(--gold); transition: color var(--transition); line-height: 1; margin-bottom: 2%; }
.slide-quote .quote-text { font-family: 'DM Serif Display', serif; font-size: clamp(18px, 5vw, 26px); line-height: 1.45; margin-bottom: 6%; }
.slide-quote .quote-author { font-size: clamp(9px, 2vw, 12px); letter-spacing: 0.2em; color: var(--gold); transition: color var(--transition); opacity: 0.9; }

/* ════════════════════════════════════════════
   POST STRIP (DRAG & DROP THUMBNAILS)
════════════════════════════════════════════ */
.post-strip { height: 80px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 1.5rem; overflow-x: auto; background: var(--surface); }
.post-strip::-webkit-scrollbar { height: 4px; }
.post-strip::-webkit-scrollbar-thumb { background: var(--border); }
.strip-thumb { flex-shrink: 0; width: 54px; height: 54px; border: 1.5px solid var(--border2); cursor: grab; display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--text2); text-align: center; transition: all 0.2s; background: var(--surface2); user-select: none; }
.strip-thumb:active { cursor: grabbing; }
.strip-thumb:hover { border-color: var(--gold); transform: translateY(-2px); }
.strip-thumb.active { border-color: var(--gold); color: var(--gold); border-width: 2px; }
.strip-thumb.add-new { font-size: 16px; border-style: dashed; cursor: pointer; }
.strip-thumb.drag-over { border-style: dashed; border-color: var(--gold); opacity: 0.5; }

/* LOADING OVERLAY */
.loading-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 9999; display: none; }
.loading-overlay.active { display: flex; }
.loading-spinner { width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="logo">APEX <span style="font-family:'IBM Plex Mono'; font-size:0.8rem; opacity:0.5;">V2</span></div>
    <span class="logo-sub">PRO CREATOR STUDIO</span>
  </div>
  <div class="header-actions">
    <button class="theme-toggle" id="theme-btn">☀️ Theme</button>
    <button class="btn-secondary" id="export-single-btn">↓ Slide</button>
    <button class="btn-primary" id="export-all-btn">↓ Export Zip</button>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Global Brand</div>
      <div class="field-group">
        <label>Accent Color</label>
        <input type="color" id="global-color" value="#c9a84c">
      </div>
      <div class="field-group">
        <label>Brand Name</label>
        <input type="text" id="global-brand-name">
      </div>
      <div class="field-group">
        <label>Custom Logo</label>
        <input type="file" id="global-logo" accept="image/*">
        <button class="btn-secondary" id="clear-logo" style="margin-top:5px; width:100%; justify-content:center; display:none; font-size:0.5rem;">Remove Logo</button>
      </div>
      <div class="field-group">
        <label>Background Image</label>
        <input type="file" id="global-bg" accept="image/*">
        <button class="btn-secondary" id="clear-bg" style="margin-top:5px; width:100%; justify-content:center; display:none; font-size:0.5rem;">Remove BG</button>
      </div>
      <div class="field-group">
        <label>BG Dark Overlay</label>
        <input type="range" id="global-overlay" min="0" max="0.9" step="0.1">
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Slide Settings</div>
      <div class="field-group">
        <label>Select Layout</label>
        <div class="template-grid" id="layout-grid">
          <button class="tpl-btn" data-type="hook">Hook</button>
          <button class="tpl-btn" data-type="list">List</button>
          <button class="tpl-btn" data-type="framework">Framework</button>
          <button class="tpl-btn" data-type="compare">Compare</button>
          <button class="tpl-btn" data-type="quote">Quote</button>
        </div>
      </div>
      
      <div id="dynamic-form-area"></div>
      
      <div class="field-group" style="margin-top: 1.5rem;">
        <button class="btn-secondary" id="delete-slide-btn" style="width:100%; justify-content:center; color: #ff5555; border-color: rgba(255,85,85,0.3);">Delete Slide</button>
      </div>
    </div>
  </aside>

  <main class="preview-area">
    <div class="preview-toolbar">
      <span class="preview-label">Canvas Preview <span id="slide-counter-label"></span></span>
      <span style="font-size:0.55rem; color:var(--text2);">1080x1080px (Drag thumbs to reorder)</span>
    </div>
    
    <div class="preview-canvas-wrap">
      <div class="ig-post-wrapper" id="capture-area">
        <div class="ig-post" id="ig-post-canvas" data-theme-post="dark"></div>
      </div>
    </div>

    <div class="post-strip" id="post-strip"></div>
  </main>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div style="font-size: 0.65rem; letter-spacing: 0.15em;" id="loading-text">GENERATING...</div>
</div>

<script>
/* ════════════════════════════════════════════
   CORE APPLICATION CLASS
════════════════════════════════════════════ */
class ApexStudio {
  constructor() {
    this.STORAGE_KEY = 'apex_studio_v2_data';
    this.activeSlideIndex = 0;
    this.draggedIndex = null;
    
    this.defaultSettings = {
      accentColor: '#c9a84c',
      brandName: 'APEX.DESIGN',
      logoUrl: null,
      bgUrl: null,
      overlay: 0.5,
      theme: 'dark'
    };

    this.defaultSlide = { 
      id: Date.now(), 
      type: 'hook', 
      data: { category: 'Design Psychology', title: 'Why your UI looks cheap (and how to fix it)', subtext: 'Swipe to discover the 3 micro-adjustments elite designers use.', indicator: 'SWIPE >>' } 
    };

    this.state = this.loadState() || {
      settings: { ...this.defaultSettings },
      slides: [ JSON.parse(JSON.stringify(this.defaultSlide)) ]
    };

    this.cacheDOM();
    this.bindEvents();
    this.initUI();
  }

  // --- Core Methods ---
  cacheDOM() {
    this.canvas = document.getElementById('ig-post-canvas');
    this.canvasWrap = document.getElementById('capture-area');
    this.formArea = document.getElementById('dynamic-form-area');
    this.strip = document.getElementById('post-strip');
    this.counterLabel = document.getElementById('slide-counter-label');
    this.loader = document.getElementById('loading-overlay');
    this.loaderText = document.getElementById('loading-text');
  }

  bindEvents() {
    // Global Inputs
    document.getElementById('global-brand-name').addEventListener('input', (e) => this.updateSetting('brandName', e.target.value));
    document.getElementById('global-overlay').addEventListener('input', (e) => this.updateSetting('overlay', e.target.value));
    document.getElementById('global-color').addEventListener('input', (e) => {
      this.updateSetting('accentColor', e.target.value);
      this.applyThemeVariables();
    });
    
    // File Uploads
    document.getElementById('global-logo').addEventListener('change', (e) => this.handleFileUpload(e, 'logoUrl'));
    document.getElementById('global-bg').addEventListener('change', (e) => this.handleFileUpload(e, 'bgUrl'));
    
    // Clear Files
    document.getElementById('clear-logo').addEventListener('click', () => { this.updateSetting('logoUrl', null); this.initUI(); });
    document.getElementById('clear-bg').addEventListener('click', () => { this.updateSetting
