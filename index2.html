<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Dynamic Instagram Post Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@300;400;500&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ════════════════════════════════════════════
   DESIGN TOKENS 
════════════════════════════════════════════ */
:root {
  --gold: #c9a84c; 
  --gold-l: #e8c97a;
  --transition: 0.25s cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"] {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: rgba(201,168,76,0.18);
  --border2: rgba(255,255,255,0.06);
  --text: #f0ebe0;
  --text2: #9a9080;
  --text3: rgba(240,235,224,0.55);
  --shadow: 0 24px 60px rgba(0,0,0,0.6);
  --glass: rgba(255,255,255,0.02);
}

[data-theme="light"] {
  --bg: #f2ede3;
  --surface: #faf7f0;
  --surface2: #ede8dc;
  --border: rgba(160,120,48,0.22);
  --border2: rgba(0,0,0,0.08);
  --text: #1a1510;
  --text2: #7a6e5e;
  --text3: rgba(26,21,16,0.5);
  --shadow: 0 24px 60px rgba(100,80,40,0.18);
  --glass: rgba(0,0,0,0.02);
}

/* ════════════════════════════════════════════
   RESET & BASE
════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'IBM Plex Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
}

/* ════════════════════════════════════════════
   HEADER
════════════════════════════════════════════ */
.app-header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: background var(--transition);
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 0.3em;
  color: var(--gold);
  line-height: 1;
}
.logo-sub {
  font-size: 0.52rem;
  letter-spacing: 0.2em;
  color: var(--text2);
  display: block;
  margin-top: -2px;
  font-family: 'IBM Plex Mono', monospace;
}

.header-actions { display: flex; align-items: center; gap: 0.75rem; }

.theme-toggle, .btn-primary, .btn-secondary {
  font-family: 'IBM Plex Mono', monospace;
  letter-spacing: 0.15em;
  cursor: pointer;
  text-transform: uppercase;
  transition: all var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
}

.theme-toggle {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-size: 0.58rem;
  padding: 6px 14px;
}
.theme-toggle:hover { border-color: var(--gold); color: var(--gold); }

.btn-primary {
  background: var(--gold);
  border: none;
  color: #0a0a0a;
  font-size: 0.6rem;
  padding: 8px 18px;
  font-weight: 500;
}
.btn-primary:hover { background: var(--gold-l); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }

.btn-secondary {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  font-size: 0.58rem;
  padding: 7px 16px;
}
.btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

/* ════════════════════════════════════════════
   LAYOUT & SIDEBAR
════════════════════════════════════════════ */
.app-body {
  display: grid;
  grid-template-columns: 340px 1fr;
  height: calc(100vh - 60px);
  overflow: hidden;
}

.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  background: var(--surface);
  transition: background var(--transition);
}

.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.sidebar-section {
  border-bottom: 1px solid var(--border2);
  padding: 1.25rem 1.5rem;
}

.sidebar-title {
  font-size: 0.55rem;
  letter-spacing: 0.28em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sidebar-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.template-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}

.tpl-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  padding: 10px 8px;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  color: var(--text2);
  text-align: center;
  transition: all var(--transition);
  line-height: 1.4;
}
.tpl-btn:hover, .tpl-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,168,76,0.06);
}

/* FORM FIELDS */
.field-group { margin-bottom: 1rem; }
.field-group:last-child { margin-bottom: 0; }
label { display: block; font-size: 0.52rem; letter-spacing: 0.2em; color: var(--text2); text-transform: uppercase; margin-bottom: 5px; }

input[type="text"], textarea, select, input[type="file"] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  color: var(--text); font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem; padding: 9px 12px; outline: none; transition: border-color var(--transition);
  resize: vertical; appearance: none; line-height: 1.5;
}
input[type="text"]:focus, textarea:focus, select:focus { border-color: var(--gold); }
textarea { min-height: 70px; }
select option { background: var(--surface); color: var(--text); }

/* File Input specific styling */
input[type="file"]::-webkit-file-upload-button {
  background: var(--gold);
  border: none;
  color: #0a0a0a;
  padding: 6px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  margin-right: 10px;
  transition: all var(--transition);
}
input[type="file"]::-webkit-file-upload-button:hover {
  background: var(--gold-l);
}

.color-picker-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 0.5rem; }
.color-swatch { height: 28px; border: 2px solid transparent; cursor: pointer; transition: all var(--transition); position: relative; }
.color-swatch.active::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
.color-swatch:hover { transform: scale(1.08); }
.color-swatch.active { border-color: var(--gold); }

.slide-nav { display: flex; align-items: center; gap: 8px; justify-content: space-between; }
.slide-nav-btn { width: 30px; height: 30px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text2); cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; transition: all var(--transition); font-family: monospace; }
.slide-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
.slide-counter { font-size: 0.6rem; color: var(--text2); letter-spacing: 0.1em; }

input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: var(--border2); outline: none; cursor: pointer; margin-top: 8px; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--gold); border-radius: 50%; cursor: pointer; }

.download-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.btn-download { background: var(--gold); border: none; color: #0a0a0a; font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem; letter-spacing: 0.15em; padding: 10px 8px; cursor: pointer; text-transform: uppercase; font-weight: 500; transition: all var(--transition); text-align: center; }
.btn-download:hover { background: var(--gold-l); }
.btn-download.all { grid-column: span 2; background: var(--surface2); border: 1px solid var(--gold); color: var(--gold); }
.btn-download.all:hover { background: rgba(201,168,76,0.1); }

/* ════════════════════════════════════════════
   MAIN PREVIEW AREA & POST STYLING
════════════════════════════════════════════ */
.preview-area { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; transition: background var(--transition); }
.preview-toolbar { height: 48px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; padding: 0 1.5rem; gap: 1rem; flex-shrink: 0; }
.preview-label { font-size: 0.55rem; letter-spacing: 0.2em; color: var(--text2); text-transform: uppercase; }
.slide-dots { display: flex; gap: 6px; margin-left: auto; }
.slide-dot { width: 8px; height: 8px; border: 1px solid var(--border); border-radius: 50%; cursor: pointer; transition: all var(--transition); background: transparent; }
.slide-dot.active { background: var(--gold); border-color: var(--gold); }

.preview-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; overflow: auto; position: relative; }
.ig-post { width: 480px; height: 480px; flex-shrink: 0; position: relative; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.3s; display: flex; flex-direction: column; cursor: default; }
.ig-post:hover { transform: scale(1.01); }

/* TEMPLATE BACKGROUNDS */
.ig-post[data-template="dark-gold"] { background: #0a0a0a; color: #f0ebe0; }
.ig-post[data-template="light-warm"] { background: #faf5ec; color: #1a1510; }
.ig-post[data-template="obsidian"] { background: #0d0d14; color: #e8e4f0; }
.ig-post[data-template="ivory"] { background: #f5f0e4; color: #1c1814; }
.ig-post[data-template="slate"] { background: #1a1f2e; color: #dce4f0; }

/* ════════════════════════════════════════════
   GLOBAL ACCENT COLORS
════════════════════════════════════════════ */
.category-badge { border-color: currentColor; }
.hook-line .accent { color: var(--gold); }
.slide-hook .rule { background: var(--gold); }
.compare-label { color: var(--gold); }
.slide-compare .col-elite { border-left: 2px solid var(--gold); background: rgba(120, 120, 120, 0.08); }
.slide-compare .col-avg { background: rgba(120, 120, 120, 0.03); }
.fw-title { color: var(--gold); }
.step-num { color: var(--gold); }
.closing-brand { color: var(--gold); }
.cap-eyebrow { color: var(--gold); }
.cap-tag { color: var(--gold); }
.closing-rule, .closing-rule2 { background: currentColor; opacity: 0.2; }
.slide-compare .bottom-accent, .slide-framework .fw-closing { border-top: 1px solid currentColor; }

/* LAYOUTS */
.slide-hook { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 36px 40px; position: relative; }
.slide-hook .top-bar { display: flex; justify-content: space-between; align-items: center; }
.slide-hook .category-badge { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; border: 1px solid currentColor; padding: 4px 10px; opacity: 0.6; }
.slide-hook .post-num { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.15em; opacity: 0.35; }
.slide-hook .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }
.slide-hook .hook-line { font-family: 'DM Serif Display', serif; font-size: 32px; line-height: 1.2; letter-spacing: -0.01em; margin-bottom: 20px; transition: font-size 0.2s; }
.slide-hook .rule { width: 40px; height: 2px; margin-bottom: 18px; }
.slide-hook .sub-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.8; letter-spacing: 0.03em; opacity: 0.6; max-width: 85%; }
.slide-hook .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; }
.slide-hook .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.35em; opacity: 0.4; }
.slide-hook .slide-indicator { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.15em; opacity: 0.3; }

.slide-list { padding: 36px 40px; display: flex; flex-direction: column; height: 100%; }
.slide-list .list-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.slide-list .list-header { font-family: 'DM Serif Display', serif; font-size: 24px; margin-bottom: 24px; line-height: 1.2;}
.slide-list .list-items { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
.slide-list .list-item { display: flex; gap: 16px; align-items: center; border-bottom: 1px dashed rgba(150,150,150,0.3); padding-bottom: 16px; }
.slide-list .list-item:last-child { border-bottom: none; }
.slide-list .list-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); opacity: 0.8; min-width: 24px;}
.slide-list .list-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.5; opacity: 0.85; }

.slide-compare { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 32px 36px 28px; position: relative; }
.slide-compare .compare-header { margin-bottom: 24px; }
.slide-compare .compare-title { font-family: 'DM Serif Display', serif; font-size: 18px; line-height: 1.3; margin-bottom: 4px; }
.slide-compare .compare-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; }
.slide-compare .compare-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; flex: 1; }
.slide-compare .col-avg, .slide-compare .col-elite { padding: 18px 16px; display: flex; flex-direction: column; gap: 10px; }
.slide-compare .col-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.55; }
.slide-compare .col-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.75; opacity: 0.8; }
.slide-compare .bottom-accent { margin-top: 20px; font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; opacity: 0.55; padding-top: 16px; line-height: 1.5; }

.slide-framework { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 32px 36px; }
.slide-framework .fw-title { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 16px; }
.slide-framework .fw-heading { font-family: 'DM Serif Display', serif; font-size: 20px; line-height: 1.3; margin-bottom: 24px; }
.slide-framework .fw-steps { flex: 1; display: flex; flex-direction: column; gap: 14px; }
.slide-framework .fw-step { display: flex; gap: 14px; align-items: flex-start; }
.slide-framework .step-num { font-family: 'Bebas Neue', sans-serif; font-size: 26px; line-height: 1; opacity: 0.8; min-width: 28px; }
.slide-framework .step-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.7; opacity: 0.75; padding-top: 2px; }
.slide-framework .fw-closing { margin-top: 20px; padding-top: 16px; font-family: 'DM Serif Display', serif; font-style: italic; font-size: 13px; opacity: 0.5; }

.slide-quote { padding: 40px; display: flex; flex-direction: column; justify-content: center; height: 100%; position: relative; text-align: center; }
.slide-quote .quote-mark { font-family: 'DM Serif Display', serif; font-size: 60px; color: var(--gold); line-height: 1; margin-bottom: 10px; }
.slide-quote .quote-text { font-family: 'DM Serif Display', serif; font-size: 22px; line-height: 1.45; margin-bottom: 24px; }
.slide-quote .quote-author { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; opacity: 0.9; }

.slide-closing { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; position: relative; }
.slide-closing .closing-rule { width: 1px; height: 60px; margin-bottom: 32px; }
.slide-closing .closing-main { font-family: 'DM Serif Display', serif; font-size: 24px; line-height: 1.35; letter-spacing: -0.01em; margin-bottom: 32px; }
.slide-closing .closing-rule2 { width: 1px; height: 40px; margin-bottom: 24px; }
.slide-closing .closing-brand { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.4em; opacity: 0.8; }
.slide-closing .closing-handle { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.2em; opacity: 0.45; margin-top: 6px; }

.slide-caption { width: 100%; height: 100%; display: flex; flex-direction: column; padding: 36px 40px; }
.slide-caption .cap-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; margin-bottom: 20px; }
.slide-caption .cap-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; line-height: 1.85; opacity: 0.75; flex: 1; }
.slide-caption .cap-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }
.slide-caption .cap-tag { font-family: 'IBM Plex Mono', monospace; font-size: 9px; opacity: 0.8; letter-spacing: 0.05em; border: 1px solid currentColor; padding: 4px 8px; border-radius: 2px;}

/* NEW: MEDIA LAYOUT */
.slide-media { width: 100%; height: 100%; display: flex; flex-direction: column; }
.slide-media .media-top { height: 50%; width: 100%; background: rgba(120,120,120,0.05); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.slide-media .media-top img { width: 100%; height: 100%; object-fit: cover; }
.slide-media .media-placeholder { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.2em; color: var(--gold); opacity: 0.5; border-bottom: 2px solid var(--gold); padding-bottom: 4px; }
.slide-media .media-bottom { height: 50%; padding: 32px 40px; display: flex; flex-direction: column; justify-content: center; }
.slide-media .media-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.slide-media .media-title { font-family: 'DM Serif Display', serif; font-size: 24px; line-height: 1.2; margin-bottom: 12px; }
.slide-media .media-desc { font-family: 'IBM Plex Mono', monospace; font-size: 11px; line-height: 1.6; opacity: 0.8; }

/* POST STRIP & OVERLAYS */
.post-strip { height: 80px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; padding: 0 1.5rem; overflow-x: auto; flex-shrink: 0; background: var(--surface); }
.post-strip::-webkit-scrollbar { height: 3px; }
.post-strip::-webkit-scrollbar-thumb { background: var(--border); }
.strip-thumb { flex-shrink: 0; width: 54px; height: 54px; border: 1.5px solid var(--border2); cursor: pointer; overflow: hidden; position: relative; transition: border-color var(--transition), transform var(--transition); display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 7px; letter-spacing: 0.1em; color: var(--text2); text-align: center; line-height: 1.4; }
.strip-thumb:hover { border-color: var(--gold); transform: scale(1.05); }
.strip-thumb.active { border-color: var(--gold); border-width: 2px; }
.strip-thumb-bg { position: absolute; inset: 0; opacity: 0.15; }
.strip-thumb-label { position: relative; z-index: 1; padding: 4px; }

.loading-overlay { position: fixed; inset: 0; background: rgba(10,10,10,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; display: none; }
.loading-overlay.active { display: flex; }
.loading-spinner { width: 40px; height: 40px; border: 2px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; }
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--gold); color: #0a0a0a; font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; letter-spacing: 0.15em; padding: 12px 20px; z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; pointer-events: none; font-weight: bold; }
.toast.show { transform: translateY(0); opacity: 1; }

@media (max-width: 900px) {
  .app-body { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; overflow: visible; }
  .sidebar { height: auto; overflow-y: visible; }
  .preview-area { height: 600px; }
  .ig-post { width: 380px; height: 380px; }
}
</style>
</head>
<body>

<header class="app-header">
  <div>
    <div class="logo">APEX
      <span class="logo-sub">Instagram Post Generator</span>
    </div>
  </div>
  <div class="header-actions">
    <button class="theme-toggle" onclick="toggleAppTheme()">
      <span id="theme-icon">☀</span>
      <span id="theme-label">Light Mode</span>
    </button>
    <button class="btn-primary" onclick="downloadCurrentSlide()">↓ Download PNG</button>
  </div>
</header>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Rendering Post...</div>
</div>
<div class="toast" id="toast"></div>

<div class="app-body">
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-title">Theme Template</div>
      <div class="template-grid">
        <button class="tpl-btn active" onclick="setTemplate('dark-gold', this)">Dark Gold</button>
        <button class="tpl-btn" onclick="setTemplate('light-warm', this)">Light Warm</button>
        <button class="tpl-btn" onclick="setTemplate('obsidian', this)">Obsidian</button>
        <button class="tpl-btn" onclick="setTemplate('ivory', this)">Ivory</button>
        <button class="tpl-btn" onclick="setTemplate('slate', this)">Slate</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Slide Manager</div>

      <div class="slide-nav" style="margin-bottom: 12px;">
        <button class="slide-nav-btn" onclick="prevSlide()">←</button>
        <span class="slide-counter" id="slide-counter">Slide 1 / 1</span>
        <button class="slide-nav-btn" onclick="nextSlide()">→</button>
      </div>

      <div style="display: flex; gap: 8px; margin-bottom: 12px;">
        <button class="btn-secondary" style="flex:1; padding: 6px;" onclick="moveSlideLeft()">← Move Left</button>
        <button class="btn-secondary" style="flex:1; padding: 6px;" onclick="moveSlideRight()">Move Right →</button>
      </div>

      <div style="display: flex; gap: 8px; margin-bottom: 8px;">
        <select id="new-slide-type" style="flex: 1;">
          <option value="hook">Hook Card</option>
          <option value="media">Image + Text Card (NEW)</option>
          <option value="list">List Card</option>
          <option value="compare">Compare Card</option>
          <option value="framework">Framework Card</option>
          <option value="quote">Quote Card</option>
          <option value="closing">Closing Card</option>
          <option value="caption">Caption Card</option>
        </select>
        <button class="btn-primary" style="padding: 0 12px;" onclick="addSlide()">+ Add</button>
      </div>

      <button class="btn-secondary" style="width: 100%; border-color: rgba(184, 50, 50, 0.4); color: var(--red);" onclick="deleteSlide()">
        Trash Current Slide
      </button>
    </div>

    <div class="sidebar-section" id="dynamic-editor">
      </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Global Style</div>
      <div class="field-group">
        <label>Hook Font Size</label>
        <input type="range" id="rng-hooksize" min="20" max="44" value="32" oninput="updateStyle()">
      </div>
      <div class="field-group">
        <label>Accent Color</label>
        <div class="color-picker-row">
          <div class="color-swatch active" style="background:#c9a84c;" data-color="#c9a84c" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#a07830;" data-color="#a07830" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#b03030;" data-color="#b03030" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#50a0dc;" data-color="#50a0dc" onclick="setAccent(this)"></div>
          <div class="color-swatch" style="background:#a078dc;" data-color="#a078dc" onclick="setAccent(this)"></div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Export</div>
      <div class="download-row">
        <button class="btn-download" onclick="downloadCurrentSlide()">↓ This Slide</button>
        <button class="btn-download all" onclick="downloadAllSlides()">↓ All Slides</button>
      </div>
    </div>

  </aside>

  <div class="preview-area">
    <div class="preview-toolbar">
      <span class="preview-label">Live Preview · 480 × 480px (exports 1080 × 1080)</span>
      <div class="slide-dots" id="slide-dots"></div>
    </div>
    <div class="preview-canvas-wrap">
      <div class="ig-post" id="ig-post" data-template="dark-gold"></div>
    </div>
    <div class="post-strip" id="post-strip"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  DYNAMIC STATE MANAGEMENT
// ════════════════════════════════════════════
let currentSlideIndex = 0;
let currentTemplate = 'dark-gold';
let currentAccent = '#c9a84c';
let hookFontSize = 32;

// Template base colors mapping
const TEMPLATE_COLORS = {
  'dark-gold': '#c9a84c',
  'light-warm': '#a07830',
  'obsidian': '#a078dc',
  'ivory': '#b03030',
  'slate': '#50a0dc'
};

// Default templates for new slides
const defaultCardData = {
  hook: { label: 'Hook', category: 'Category Tag', postnum: '01 / 05', hook: 'The main hook text goes here.', accent: 'hook text', sub: 'Sub-text explaining the hook below the line.', brand: 'SHIVAM ELECTRONICS' },
  media: { label: 'Image + Text', eyebrow: 'Featured Product', title: 'Premium Display', text: 'Experience vibrant colors and deep blacks with our latest smart LED technology.', imageSrc: '' },
  list: { label: 'List', eyebrow: 'Top Picks', title: 'Top Tech Upgrades', items: '4K Smart LED Displays\nHigh-Efficiency Inverter ACs\nNext-Gen Gaming Laptops\nNoise-Cancelling Audio\nSmart Home Hubs' },
  compare: { label: 'Compare', category: 'Concept vs Concept', avg: 'What the average person does...', elite: 'What the elite person does...', bottom: 'A powerful summarizing quote or insight.' },
  framework: { label: 'Framework', category: 'Framework Title', steps: 'Step one instruction.\nStep two instruction.\nStep three instruction.', closing: 'Closing thought for the framework.' },
  quote: { label: 'Quote', quote: 'Quality is remembered long after the price is forgotten.', author: 'Aldo Gucci' },
  closing: { label: 'Closing', closing: '"A powerful quote to end the carousel."', brand: 'SHIVAM ELECTRONICS', handle: '@shivamelectronics' },
  caption: { label: 'Caption', caption: 'Your Instagram caption text goes here.', tags: '#Tag1 #Tag2 #Tag3' }
};

// Start with an extended setup
let slides = [
  { type: 'hook', ...defaultCardData.hook },
  { type: 'media', ...defaultCardData.media },
  { type: 'list', ...defaultCardData.list },
  { type: 'quote', ...defaultCardData.quote },
  { type: 'closing', ...defaultCardData.closing }
];

// ════════════════════════════════════════════
//  IMAGE UPLOAD HANDLER
// ════════════════════════════════════════════
function handleImageUpload(input) {
  if (input.files && input.files[0]) {
    const reader = new FileReader();
    reader.onload = function(e) {
      updateSlideData('imageSrc', e.target.result);
    };
    reader.readAsDataURL(input.files[0]);
  }
}

// ════════════════════════════════════════════
//  SIDEBAR RENDERING
// ════════════════════════════════════════════
function renderSidebar() {
  const editor = document.getElementById('dynamic-editor');
  const slide = slides[currentSlideIndex];
  let html = `<div class="sidebar-title">Editing: ${slide.label} Card</div>`;

  const makeInput = (key, label, type = 'text') => {
    if (type === 'textarea') {
      return `<div class="field-group"><label>${label}</label><textarea oninput="updateSlideData('${key}', this.value)">${slide[key]}</textarea></div>`;
    }
    return `<div class="field-group"><label>${label}</label><input type="text" value="${slide[key]}" oninput="updateSlideData('${key}', this.value)"></div>`;
  };

  if (slide.type === 'hook') {
    html += makeInput('category', 'Category Tag');
    html += makeInput('postnum', 'Post Number');
    html += makeInput('hook', 'Main Hook', 'textarea');
    html += makeInput('accent', 'Hook Accent Word(s)');
    html += makeInput('sub', 'Sub Text', 'textarea');
    html += makeInput('brand', 'Brand Name');
  } 
  else if (slide.type === 'media') {
    html += `<div class="field-group">
               <label>Upload Image</label>
               <input type="file" accept="image/*" onchange="handleImageUpload(this)">
             </div>`;
    html += makeInput('eyebrow', 'Small Eyebrow Text');
    html += makeInput('title', 'Main Title');
    html += makeInput('text', 'Description text', 'textarea');
  }
  else if (slide.type === 'list') {
    html += makeInput('eyebrow', 'Small Eyebrow Text');
    html += makeInput('title', 'List Title');
    html += makeInput('items', 'List Items (One per line)', 'textarea');
  }
  else if (slide.type === 'compare') {
    html += makeInput('category', 'Comparison Title');
    html += makeInput('avg', 'Average Column Text', 'textarea');
    html += makeInput('elite', 'Elite Column Text', 'textarea');
    html += makeInput('bottom', 'Bottom Accent Quote', 'textarea');
  } 
  else if (slide.type === 'framework') {
    html += makeInput('category', 'Framework Heading');
    html += makeInput('steps', 'Steps (One per line)', 'textarea');
    html += makeInput('closing', 'Closing Note');
  } 
  else if (slide.type === 'quote') {
    html += makeInput('quote', 'The Quote', 'textarea');
    html += makeInput('author', 'Author / Source');
  }
  else if (slide.type === 'closing') {
    html += makeInput('closing', 'Main Quote', 'textarea');
    html += makeInput('brand', 'Brand Name');
    html += makeInput('handle', 'Social Handle');
  } 
  else if (slide.type === 'caption') {
    html += makeInput('caption', 'Caption Text', 'textarea');
    html += makeInput('tags', 'Hashtags (Space separated)');
  }

  editor.innerHTML = html;
}

function updateSlideData(key, value) {
  slides[currentSlideIndex][key] = value;
  updatePost();
}

// ════════════════════════════════════════════
//  SLIDE MANAGER ACTIONS
// ════════════════════════════════════════════
function addSlide() {
  const type = document.getElementById('new-slide-type').value;
  const newSlide = { type: type, ...defaultCardData[type] };
  slides.splice(currentSlideIndex + 1, 0, newSlide);
  currentSlideIndex++; 
  refreshAll();
  showToast(`Added new ${type} slide`);
}

function deleteSlide() {
  if (slides.length <= 1) {
    showToast("You must have at least one slide!");
    return;
  }
  slides.splice(currentSlideIndex, 1);
  if (currentSlideIndex >= slides.length) currentSlideIndex = slides.length - 1;
  refreshAll();
  showToast("Slide deleted");
}

function moveSlideLeft() {
  if (currentSlideIndex === 0) return;
  const temp = slides[currentSlideIndex];
  slides[currentSlideIndex] = slides[currentSlideIndex - 1];
  slides[currentSlideIndex - 1] = temp;
  currentSlideIndex--;
  refreshAll();
}

function moveSlideRight() {
  if (currentSlideIndex === slides.length - 1) return;
  const temp = slides[currentSlideIndex];
  slides[currentSlideIndex] = slides[currentSlideIndex + 1];
  slides[currentSlideIndex + 1] = temp;
  currentSlideIndex++;
  refreshAll();
}

function goToSlide(idx) {
  currentSlideIndex = Math.max(0, Math.min(slides.length - 1, idx));
  refreshAll();
}

function prevSlide() { goToSlide(currentSlideIndex - 1); }
function nextSlide() { goToSlide(currentSlideIndex + 1); }

function refreshAll() {
  renderSidebar();
  updatePost();
}

// ════════════════════════════════════════════
//  RENDER POST
// ════════════════════════════════════════════
function updatePost() {
  const slide = slides[currentSlideIndex];
  const post = document.getElementById('ig-post');
  post.innerHTML = renderSlideHTML(slide);

  post.style.setProperty('--gold', currentAccent);

  document.getElementById('slide-counter').textContent = `Slide ${currentSlideIndex + 1} / ${slides.length}`;
  updateDots();
  updateSlideStrip();
}

function updateStyle() {
  hookFontSize = document.getElementById('rng-hooksize').value;
  updatePost();
}

function escHtml(s) {
  return (s || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightAccent(text, accentPhrase) {
  if (!accentPhrase || !accentPhrase.trim()) return escHtml(text);
  const escaped = escHtml(accentPhrase);
  const escapedText = escHtml(text);
  return escapedText.replace(escaped, `<span class="accent">${escaped}</span>`);
}

function renderSlideHTML(d) {
  if (d.type === 'hook') {
    return `<div class="slide-hook">
      <div class="top-bar"><span class="category-badge">${escHtml(d.category)}</span><span class="post-num">${escHtml(d.postnum)}</span></div>
      <div class="main-content"><div class="hook-line" style="font-size:${hookFontSize}px">${highlightAccent(d.hook, d.accent)}</div><div class="rule"></div><div class="sub-text">${escHtml(d.sub)}</div></div>
      <div class="bottom-bar"><span class="brand-name">${escHtml(d.brand)}</span><span class="slide-indicator">${currentSlideIndex + 1} / ${slides.length}</span></div>
    </div>`;
  }
  if (d.type === 'media') {
    const imgHtml = d.imageSrc 
      ? `<img src="${d.imageSrc}" alt="uploaded">` 
      : `<div class="media-placeholder">[ UPLOAD IMAGE ]</div>`;
    return `<div class="slide-media">
      <div class="media-top">${imgHtml}</div>
      <div class="media-bottom">
        <div class="media-eyebrow">↳ ${escHtml(d.eyebrow)}</div>
        <div class="media-title">${escHtml(d.title)}</div>
        <div class="media-desc">${escHtml(d.text)}</div>
      </div>
    </div>`;
  }
  if (d.type === 'list') {
    const itemsArray = d.items ? d.items.split('\n').filter(s => s.trim()) : [];
    const itemsHtml = itemsArray.map((s, i) => `<div class="list-item"><div class="list-num">0${i+1}</div><div class="list-text">${escHtml(s)}</div></div>`).join('');
    return `<div class="slide-list">
      <div class="list-eyebrow">↳ ${escHtml(d.eyebrow)}</div>
      <div class="list-header">${escHtml(d.title)}</div>
      <div class="list-items">${itemsHtml}</div>
    </div>`;
  }
  if (d.type === 'compare') {
    return `<div class="slide-compare">
      <div class="compare-header"><div class="compare-label">Average vs Elite Thinking</div><div class="compare-title">${escHtml(d.category)}</div></div>
      <div class="compare-cols">
        <div class="col-avg"><div class="col-label">Average</div><div class="col-text">${escHtml(d.avg)}</div></div>
        <div class="col-elite"><div class="col-label">Elite</div><div class="col-text">${escHtml(d.elite)}</div></div>
      </div>
      <div class="bottom-accent">${escHtml(d.bottom)}</div>
    </div>`;
  }
  if (d.type === 'framework') {
    const stepsArray = d.steps ? d.steps.split('\n').filter(s => s.trim()) : [];
    const stepsHtml = stepsArray.map((s, i) => `<div class="fw-step"><span class="step-num">0${i+1}</span><span class="step-text">${escHtml(s)}</span></div>`).join('');
    return `<div class="slide-framework">
      <div class="fw-title">↳ Framework</div>
      <div class="fw-heading">${escHtml(d.category)}</div>
      <div class="fw-steps">${stepsHtml}</div>
      <div class="fw-closing">${escHtml(d.closing)}</div>
    </div>`;
  }
  if (d.type === 'quote') {
    return `<div class="slide-quote">
      <div class="quote-mark">"</div>
      <div class="quote-text">${escHtml(d.quote)}</div>
      <div class="quote-author">— ${escHtml(d.author)}</div>
    </div>`;
  }
  if (d.type === 'closing') {
    return `<div class="slide-closing">
      <div class="closing-rule"></div><div class="closing-main">${escHtml(d.closing)}</div><div class="closing-rule2"></div>
      <div class="closing-brand">${escHtml(d.brand)}</div><div class="closing-handle">${escHtml(d.handle)}</div>
    </div>`;
  }
  if (d.type === 'caption') {
    const tagsArray = d.tags ? d.tags.split(' ').filter(t => t.trim()) : [];
    const tagsHtml = tagsArray.map(t => `<span class="cap-tag">${escHtml(t)}</span>`).join('');
    return `<div class="slide-caption">
      <div class="cap-eyebrow">↳ Caption &amp; Hashtags</div>
      <div class="cap-text">${escHtml(d.caption)}</div>
      <div class="cap-tags">${tagsHtml}</div>
    </div>`;
  }
  return '';
}

// ════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════
function updateDots() {
  const wrap = document.getElementById('slide-dots');
  wrap.innerHTML = slides.map((s, i) => `<div class="slide-dot ${i === currentSlideIndex ? 'active' : ''}" onclick="goToSlide(${i})" title="${s.label}"></div>`).join('');
}

const STRIP_COLORS = { 'dark-gold': '#0a0a0a', 'light-warm': '#faf5ec', 'obsidian': '#0d0d14', 'ivory': '#f5f0e4', 'slate': '#1a1f2e' };

function updateSlideStrip() {
  const strip = document.getElementById('post-strip');
  const bg = STRIP_COLORS[currentTemplate] || '#0a0a0a';
  strip.innerHTML = slides.map((s, i) => 
    `<div class="strip-thumb ${i === currentSlideIndex ? 'active' : ''}" onclick="goToSlide(${i})" title="${s.label}">
      <div class="strip-thumb-bg" style="background:${bg}"></div>
      <div class="strip-thumb-label">${s.label}<br><span style="opacity:0.5">${i+1}</span></div>
    </div>`
  ).join('');
}

function setTemplate(tpl, btn) {
  currentTemplate = tpl;
  document.getElementById('ig-post').setAttribute('data-template', tpl);

  document.querySelectorAll('.tpl-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  currentAccent = TEMPLATE_COLORS[tpl];

  document.querySelectorAll('.color-swatch').forEach(s => {
    if (s.dataset.color === currentAccent) s.classList.add('active');
    else s.classList.remove('active');
  });

  updatePost();
}

function setAccent(swatch) {
  currentAccent = swatch.dataset.color;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  swatch.classList.add('active');
  updatePost();
}

let appTheme = 'dark';
function toggleAppTheme() {
  appTheme = appTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', appTheme);
  document.getElementById('theme-icon').textContent = appTheme === 'dark' ? '☀' : '☾';
  document.getElementById('theme-label').textContent = appTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
}

// ════════════════════════════════════════════
//  DOWNLOAD LOGIC
// ════════════════════════════════════════════
function showLoading() { document.getElementById('loading').classList.add('active'); }
function hideLoading() { document.getElementById('loading').classList.remove('active'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

async function renderToCanvas(slideIdx) {
  const post = document.getElementById('ig-post');
  const originalHTML = post.innerHTML;

  post.innerHTML = renderSlideHTML(slides[slideIdx]);
  post.style.setProperty('--gold', currentAccent);

  await new Promise(r => setTimeout(r, 80));

  const canvas = await html2canvas(post, {
    scale: 2.25,
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    width: 480,
    height: 480,
    logging: false
  });

  post.innerHTML = originalHTML;
  post.style.setProperty('--gold', currentAccent);
  return canvas;
}

async function downloadCurrentSlide() {
  showLoading();
  try {
    const canvas = await renderToCanvas(currentSlideIndex);
    const link = document.createElement('a');
    link.download = `post-slide-${currentSlideIndex + 1}-${slides[currentSlideIndex].type}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('↓ Slide downloaded!');
  } catch(e) { showToast('Error: ' + e.message); }
  hideLoading();
}

async function downloadAllSlides() {
  showLoading();
  try {
    for (let i = 0; i < slides.length; i++) {
      const canvas = await renderToCanvas(i);
      const link = document.createElement('a');
      link.download = `post-slide-${i+1}-${slides[i].type}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      await new Promise(r => setTimeout(r, 300));
    }
    showToast(`↓ All ${slides.length} slides downloaded!`);
  } catch(e) { showToast('Error: ' + e.message); }
  hideLoading();
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowLeft') prevSlide();
  if (e.key === 'ArrowRight') nextSlide();
});

refreshAll();
</script>
</body>
</html>
